# Frontend Development - Backend built from local source
#
# Usage:
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. ./scripts/dev-web-tmux.sh
#   3. Open http://localhost:5173 (default) or http://localhost:5174 (classic)
#
# Rebuild backend after Go code changes:
#   docker compose -f docker-compose.dev.yml up -d --build new-api
#
# Stop:
#   docker compose -f docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api:dev
    container_name: new-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - new_api_dev_data:/data
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - new-api-dev-network

  redis:
    image: redis:latest
    container_name: new-api-redis
    restart: unless-stopped
    networks:
      - new-api-dev-network

  postgres:
    image: postgres:latest
    container_name: new-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - new_api_dev_pg_data:/var/lib/postgresql
    networks:
      - new-api-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  new_api_dev_data:
  new_api_dev_pg_data:

networks:
  new-api-dev-network:
    driver: bridge
